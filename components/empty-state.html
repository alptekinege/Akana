<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Akana · Empty state</title>
  <link rel="stylesheet" href="../assets/fonts.css">
  <link rel="stylesheet" href="../assets/tokens.css">
  <link rel="stylesheet" href="../assets/components.css">
</head>
<body class="akana">
  <main class="ak-demo">
    <span class="ak-label">Component</span>
    <h1>Empty state</h1>
    <p class="lead">When there is nothing to show. Icon + title + body + actions. Dashed border keeps it quiet; primary action is still ink.</p>

    <div class="ak-empty">
      <span class="ak-empty__icon">
        <span class="ak-icon" data-icon="document" data-size="22"></span>
      </span>
      <h2 class="ak-empty__title">No projects yet</h2>
      <p class="ak-empty__body">Create a project to start collecting components, notes, and exports in one place.</p>
      <div class="ak-empty__actions">
        <button type="button" class="ak-btn">
          <span class="ak-icon" data-icon="plus"></span> New project
        </button>
        <button type="button" class="ak-btn ak-btn--secondary">Import</button>
      </div>
    </div>
  </main>
  <script src="../assets/icons.js"></script>
</body>
</html>
