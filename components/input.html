<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Akana · Input</title>
  <link rel="stylesheet" href="../assets/fonts.css">
  <link rel="stylesheet" href="../assets/tokens.css">
  <link rel="stylesheet" href="../assets/components.css">
</head>
<body class="akana">
  <main class="ak-demo">
    <span class="ak-label">Component</span>
    <h1>Input</h1>
    <p class="lead">Label-led fields with an optional leading icon and helper text. Errors stay monochrome — emphasis comes from the border and weight.</p>

    <div class="ak-stack" style="max-width: 420px;">
      <div class="ak-field">
        <label class="ak-field__label" for="ex-name">Name</label>
        <div class="ak-input">
          <span class="ak-icon" data-icon="user"></span>
          <input id="ex-name" type="text" placeholder="Ada Lovelace" autocomplete="off">
        </div>
        <span class="ak-field__help">Shown on your profile and exports.</span>
      </div>

      <div class="ak-field">
        <label class="ak-field__label" for="ex-mail">Email</label>
        <div class="ak-input">
          <span class="ak-icon" data-icon="mail"></span>
          <input id="ex-mail" type="email" placeholder="you@domain.com" autocomplete="off">
        </div>
        <span class="ak-field__help">We never share this address.</span>
      </div>

      <div class="ak-field ak-field--error">
        <label class="ak-field__label" for="ex-bad">Handle</label>
        <div class="ak-input">
          <span class="ak-icon" data-icon="warning"></span>
          <input id="ex-bad" type="text" value="already taken" autocomplete="off">
        </div>
        <span class="ak-field__help">That handle is unavailable.</span>
      </div>
    </div>
  </main>
  <script src="../assets/icons.js"></script>
</body>
</html>
