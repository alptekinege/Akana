<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Akana · Badge</title>
  <link rel="stylesheet" href="../assets/fonts.css">
  <link rel="stylesheet" href="../assets/tokens.css">
  <link rel="stylesheet" href="../assets/components.css">
</head>
<body class="akana">
  <main class="ak-demo">
    <span class="ak-label">Component</span>
    <h1>Badge</h1>
    <p class="lead">Small status and category markers. Outlined by default, solid for the one thing that matters. Pair with an icon when it aids scanning.</p>

    <div class="ak-stack">
      <div>
        <div class="ak-section-title">Outlined</div>
        <div class="ak-row">
          <span class="ak-badge"><span class="ak-icon" data-icon="tag"></span> Draft</span>
          <span class="ak-badge"><span class="ak-icon" data-icon="clock"></span> Pending</span>
          <span class="ak-badge"><span class="ak-icon" data-icon="star"></span> Featured</span>
          <span class="ak-badge">v1.0</span>
        </div>
      </div>
      <div>
        <div class="ak-section-title">Solid</div>
        <div class="ak-row">
          <span class="ak-badge ak-badge--solid"><span class="ak-icon" data-icon="check"></span> Published</span>
          <span class="ak-badge ak-badge--solid">Live</span>
        </div>
      </div>
    </div>
  </main>
  <script src="../assets/icons.js"></script>
</body>
</html>
