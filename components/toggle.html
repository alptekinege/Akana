<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Akana · Toggle</title>
  <link rel="stylesheet" href="../assets/fonts.css">
  <link rel="stylesheet" href="../assets/tokens.css">
  <link rel="stylesheet" href="../assets/components.css">
</head>
<body class="akana">
  <main class="ak-demo">
    <span class="ak-label">Component</span>
    <h1>Toggle</h1>
    <p class="lead">A binary on/off control. Built on the native checkbox with <code>role="switch"</code> so screen readers announce it correctly. State comes from the thumb sliding — no color.</p>

    <div class="ak-stack" style="max-width: 420px;">
      <label class="ak-toggle">
        <input type="checkbox" role="switch" aria-checked="false" checked>
        <span class="ak-toggle__track" aria-hidden="true"><span class="ak-toggle__thumb"></span></span>
        <span class="ak-toggle__label">Compact density</span>
      </label>

      <label class="ak-toggle">
        <input type="checkbox" role="switch" aria-checked="false">
        <span class="ak-toggle__track" aria-hidden="true"><span class="ak-toggle__thumb"></span></span>
        <span class="ak-toggle__label">Email notifications</span>
      </label>

      <label class="ak-toggle">
        <input type="checkbox" role="switch" aria-checked="false" disabled>
        <span class="ak-toggle__track" aria-hidden="true"><span class="ak-toggle__thumb"></span></span>
        <span class="ak-toggle__label" style="color: var(--text-muted);">Offline (locked)</span>
      </label>
    </div>
  </main>

  <script src="../assets/icons.js"></script>
  <script>
    // Keep aria-checked in sync with the native checkbox state.
    document.querySelectorAll('.ak-toggle input').forEach(function (el) {
      var sync = function () { el.setAttribute('aria-checked', el.checked ? 'true' : 'false'); };
      el.addEventListener('change', sync);
      sync();
    });
  </script>
</body>
</html>
