<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Akana · Breadcrumb</title>
  <link rel="stylesheet" href="../assets/fonts.css">
  <link rel="stylesheet" href="../assets/tokens.css">
  <link rel="stylesheet" href="../assets/components.css">
</head>
<body class="akana">
  <main class="ak-demo">
    <span class="ak-label">Component</span>
    <h1>Breadcrumb</h1>
    <p class="lead">Wayfinding trail. Separators are chevrons; current page is ink weight, not a colored chip. Use a <code>nav</code> landmark with an accessible name.</p>

    <nav aria-label="Breadcrumb" style="max-width: 560px;">
      <ol class="ak-breadcrumb">
        <li class="ak-breadcrumb__item">
          <a href="#">Home</a>
          <span class="ak-breadcrumb__sep ak-icon" data-icon="chevron-right" data-size="14" aria-hidden="true"></span>
        </li>
        <li class="ak-breadcrumb__item">
          <a href="#">Projects</a>
          <span class="ak-breadcrumb__sep ak-icon" data-icon="chevron-right" data-size="14" aria-hidden="true"></span>
        </li>
        <li class="ak-breadcrumb__item">
          <a href="#">Akana</a>
          <span class="ak-breadcrumb__sep ak-icon" data-icon="chevron-right" data-size="14" aria-hidden="true"></span>
        </li>
        <li class="ak-breadcrumb__item" aria-current="page">Components</li>
      </ol>
    </nav>
  </main>
  <script src="../assets/icons.js"></script>
</body>
</html>
