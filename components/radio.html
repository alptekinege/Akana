<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Akana · Radio</title>
  <link rel="stylesheet" href="../assets/fonts.css">
  <link rel="stylesheet" href="../assets/tokens.css">
  <link rel="stylesheet" href="../assets/components.css">
</head>
<body class="akana">
  <main class="ak-demo">
    <span class="ak-label">Component</span>
    <h1>Radio</h1>
    <p class="lead">Single choice in a group. Selected state uses a thicker ink border ring — still monochrome. Native radio inputs; no JS required.</p>

    <div class="ak-stack" style="max-width: 420px;">
      <section>
        <div class="ak-section-title">Plan</div>
        <div class="ak-choice-group" role="radiogroup" aria-label="Plan">
          <label class="ak-choice ak-choice--radio">
            <input type="radio" name="plan" value="free" checked>
            <span class="ak-choice__box"></span>
            <span class="ak-choice__text">Free
              <span class="ak-choice__hint">Personal use, one project.</span>
            </span>
          </label>
          <label class="ak-choice ak-choice--radio">
            <input type="radio" name="plan" value="pro">
            <span class="ak-choice__box"></span>
            <span class="ak-choice__text">Pro
              <span class="ak-choice__hint">Team seats and priority support.</span>
            </span>
          </label>
          <label class="ak-choice ak-choice--radio">
            <input type="radio" name="plan" value="enterprise" disabled>
            <span class="ak-choice__box"></span>
            <span class="ak-choice__text">Enterprise (unavailable)</span>
          </label>
        </div>
      </section>
    </div>
  </main>
  <script src="../assets/icons.js"></script>
</body>
</html>
