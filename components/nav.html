<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Akana · Nav</title>
  <link rel="stylesheet" href="../assets/fonts.css">
  <link rel="stylesheet" href="../assets/tokens.css">
  <link rel="stylesheet" href="../assets/components.css">
</head>
<body class="akana">
  <main class="ak-demo">
    <span class="ak-label">Component</span>
    <h1>Nav</h1>
    <p class="lead">Icon-and-text navigation. The active item is marked by surface, not color. Works as tabs or a segmented control.</p>

    <div class="ak-stack">
      <div>
        <div class="ak-section-title">Segmented</div>
        <nav class="ak-nav" aria-label="Sections">
          <button class="ak-nav__item" type="button" aria-current="true">
            <span class="ak-icon" data-icon="grid"></span> Overview
          </button>
          <button class="ak-nav__item" type="button">
            <span class="ak-icon" data-icon="document"></span> Files
          </button>
          <button class="ak-nav__item" type="button">
            <span class="ak-icon" data-icon="clock"></span> History
          </button>
          <button class="ak-nav__item" type="button">
            <span class="ak-icon" data-icon="settings"></span> Settings
          </button>
        </nav>
      </div>

      <div>
        <div class="ak-section-title">Active state follows click</div>
        <nav class="ak-nav" id="demo-nav" aria-label="Demo">
          <button class="ak-nav__item" type="button">
            <span class="ak-icon" data-icon="user"></span> Account
          </button>
          <button class="ak-nav__item" type="button">
            <span class="ak-icon" data-icon="mail"></span> Invites
          </button>
        </nav>
      </div>
    </div>
  </main>
  <script src="../assets/icons.js"></script>
  <script>
    // Demo interaction: move aria-current on click.
    document.querySelectorAll('.ak-nav').forEach(function (nav) {
      nav.addEventListener('click', function (e) {
        var item = e.target.closest('.ak-nav__item');
        if (!item) return;
        nav.querySelectorAll('.ak-nav__item').forEach(function (b) {
          b.removeAttribute('aria-current');
        });
        item.setAttribute('aria-current', 'true');
      });
    });
  </script>
</body>
</html>
